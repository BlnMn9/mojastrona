<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Moja strona</title>
  
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="ruble-sign.png">
</head>
<body>

  <div class="top">
    <h1>Cześć 👋</h1>

    <p id="tekst">Moja strona działa teraz z JavaScript!</p>

    <button onclick="zmienTekst()">Kliknij mnie</button>

    <button id="darkModeBtn" onclick="przelaczMotyw()">
      🌙 Dark Mode
    </button>
  </div>

  <div class="card">
    <h2>O mnie</h2>
    <p>
      Hej 👋 Uczę się tworzenia stron internetowych i to jest moja pierwsza strona na GitHub Pages 🚀
    </p>
  </div>

  <div class="center">
    <div class="game">

      <h2>🎮 Timing Hold Game</h2>

      <div id="status">Kliknij START</div>

      <button id="startBtn" onclick="startHoldGame()">START</button>

      <button id="holdBtn"
              onmousedown="startHold()"
              onmouseup="endHold()"
              ontouchstart="startHold()"
              ontouchend="endHold()"
              disabled>
        TRZYMAJ MNIE
      </button>

      <p id="wynik"></p>

    </div>
  </div>

  <script src="script.js"></script>


<canvas id="canvas"></canvas>

</body>

</html>
